# Aether production cross-service configuration.
# Used by cmd/executor (admin HTTP) and cmd/telebot (Telegram dashboard).
#
# All secrets reference env vars via "env:VAR_NAME" syntax.
# Fill in .env before starting the stack.

[telegram]
# Bot token for the live metrics dashboard in Telegram.
# Get from @BotFather: https://t.me/BotFather
bot_token = "env:TELEGRAM_BOT_TOKEN"
# Your Telegram user ID(s) for receiving dashboard updates.
# Get from @userinfobot: https://t.me/userinfobot
# Format: [123456789] or [111111, 222222]
admin_chat_ids = [123456789]
# How often to push dashboard updates (seconds)
dashboard_update_interval_secs = 3
# Internal executor metrics JSON URL (in Docker: aether-rust:9092)
executor_metrics_url = "http://aether-rust:9092/metrics/json"

[redis]
# Optional Redis URL for pub/sub event distribution.
# Leave empty if not using Redis.
url = "env:REDIS_URL"

[executor]
# Admin HTTP port (metrics JSON, /admin/*). Override with ADMIN_HTTP_PORT env.
port = 8080
# Set AETHER_ADMIN_TOKEN in .env — required when AETHER_ENV=production.
discovery_top_pools_url = "http://aether-rust:9093/top-pools"
signer_connection_pool = true
# Optional admin POST rate limit (requests/sec). 0 = disabled.
admin_rate_limit_rps = 10.0

[monitor]
# Dashboard HTTP port (distinct from executor admin to avoid :8080 conflicts).
port = 8090

[monitor.alerting]
# Optional native alert integrations (secrets via env: prefix).
pagerduty_routing_key = "env:PD_ROUTING_KEY"
telegram_bot_token = "env:TELEGRAM_ALERT_BOT_TOKEN"
telegram_chat_id = "env:TELEGRAM_ALERT_CHAT_ID"
discord_webhook_url = "env:DISCORD_WEBHOOK_URL"
alert_webhook_url = "env:ALERT_WEBHOOK_URL"
