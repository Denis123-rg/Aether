# Aether Full Test Suite — Go Stress Tests + Foundry Fork Tests
#
# Runs on every push/PR to main and on manual dispatch.
#
# Jobs:
#   1. Go stress tests (tests/stress_go/) — 130+ scenarios
#   2. Foundry fork tests (contracts/test/*.fork.t.sol) — 175 tests against Anvil fork
#
# Secrets required:
#   ETH_RPC_URL — Ethereum mainnet RPC endpoint for Anvil fork

name: Full Test Suite — Stress + Fork

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: full-test-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FOUNDRY_PROFILE: ci
  DATABASE_URL: postgresql://aether:secret@postgres:5432/aether
  ETH_RPC_URL: ${{ secrets.ETH_RPC_URL }}

jobs:
  test:
    name: Stress + Fork Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: aether
          POSTGRES_PASSWORD: secret
          POSTGRES_DB: aether
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      # ── 2. Setup Go ──────────────────────────────────────────────────────
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      # ── 3. Setup Foundry ─────────────────────────────────────────────────
      - uses: foundry-rs/foundry-toolchain@v1
        with:
          cache: true

      # ── 4. System dependencies ───────────────────────────────────────────
      - name: Install protobuf compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler postgresql-client

      - name: Install Foundry dependencies
        working-directory: contracts
        run: forge install

      - name: Verify toolchain
        run: |
          go version
          forge --version
          anvil --version

      # ── 5. Database setup ────────────────────────────────────────────────
      - name: Apply database migrations
        run: |
          for f in migrations/*.sql; do
            echo "Applying $f..."
            psql "$DATABASE_URL" -f "$f"
          done

      # ── 6. Run Go stress tests ──────────────────────────────────────────
      - name: Run Go stress tests
        continue-on-error: true
        id: go-stress
        run: |
          set -o pipefail
          echo "=== Go stress tests: $(grep -c 'func Test' tests/stress_go/*_test.go) test functions ==="
          go test ./tests/stress_go/ -v -count=1 -timeout=30m 2>&1 | tee go-stress-output.txt

      # ── 7. Prepare Anvil fork ───────────────────────────────────────────
      - name: Check ETH_RPC_URL
        id: check_rpc
        run: |
          if [ -z "$ETH_RPC_URL" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "ETH_RPC_URL not set — skipping fork tests"
          fi

      - name: Start Anvil fork
        if: steps.check_rpc.outputs.skip != 'true'
        run: |
          anvil --fork-url "$ETH_RPC_URL" --fork-block-number 19800000 --silent &
          ANVIL_PID=$!
          echo "ANVIL_PID=$ANVIL_PID" >> "$GITHUB_ENV"
          sleep 5
          curl -s -o /dev/null -w "%{http_code}" http://localhost:8545 || {
            echo "Anvil failed to start"
            exit 1
          }
          echo "Anvil ready (PID $ANVIL_PID)"

      # ── 8. Run Foundry fork tests ──────────────────────────────────────
      - name: Run fork tests
        if: steps.check_rpc.outputs.skip != 'true'
        id: forge-fork
        working-directory: contracts
        run: |
          set -o pipefail
          echo "=== Running 175 Foundry fork tests against Anvil ==="
          forge test -vvv --match-path "test/*.fork.t.sol" --fork-url http://localhost:8545 2>&1 | tee ../forge-fork-output.txt
          echo "=== Fork tests complete ==="

      - name: Stop Anvil
        if: always()
        run: pkill -f anvil || true

      # ── 9. Report ────────────────────────────────────────────────────────
      - name: Test summary
        if: always()
        run: |
          {
            echo "## Aether Full Test Suite Results"
            echo ""

            # Go stress results
            if [ -f go-stress-output.txt ]; then
              PASS=$(grep -c '^--- PASS:' go-stress-output.txt || echo 0)
              FAIL=$(grep -c '^--- FAIL:' go-stress-output.txt || echo 0)
              SKIP=$(grep -c '^--- SKIP:' go-stress-output.txt || echo 0)
              echo "### Go Stress Tests"
              echo "| Status | Count |"
              echo "|--------|-------|"
              echo "| Passed | $PASS |"
              echo "| Failed | $FAIL |"
              echo "| Skipped | $SKIP |"
              echo ""

              if [ "$FAIL" -gt 0 ]; then
                echo "**Failed tests:**"
                echo '```'
                grep '^--- FAIL:' go-stress-output.txt || echo "(none)"
                echo '```'
                echo ""
              fi
            else
              echo "### Go Stress Tests — no output file"
              echo ""
            fi

            # Foundry fork results
            if [ -f forge-fork-output.txt ]; then
              PASS=$(grep -c '\[PASS\]' forge-fork-output.txt || echo 0)
              FAIL=$(grep -c '\[FAIL\]' forge-fork-output.txt || echo 0)
              echo "### Foundry Fork Tests"
              echo "| Status | Count |"
              echo "|--------|-------|"
              echo "| Passed | $PASS |"
              echo "| Failed | $FAIL |"
              echo ""

              if [ "$FAIL" -gt 0 ]; then
                echo "**Failed tests:**"
                echo '```'
                grep '\[FAIL\]' forge-fork-output.txt || echo "(none)"
                echo '```'
                echo ""
              fi

              # Suite summary line
              grep -E '^Suite result:|^Ran [0-9]+ test' forge-fork-output.txt || true
            else
              echo "### Foundry Fork Tests — skipped (ETH_RPC_URL not set)"
              echo ""
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          # Fail job if fork tests failed
          if [ -f forge-fork-output.txt ] && grep -q '\[FAIL\]' forge-fork-output.txt; then
            echo "Fork tests have failures — marking job as failed"
            exit 1
          fi

      # ── 10. Upload logs ──────────────────────────────────────────────────
      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-${{ github.run_id }}
          path: |
            go-stress-output.txt
            forge-fork-output.txt
          retention-days: 30
