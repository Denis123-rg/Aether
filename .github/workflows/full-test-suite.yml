name: Full Test Suite — Stress + Fork

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: full-test-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FOUNDRY_PROFILE: ci
  DATABASE_URL: postgresql://aether:secret@localhost:5432/aether
  ETH_RPC_URL: https://ethereum-rpc.publicnode.com

jobs:
  go-stress-tests:
    name: Go Stress Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: aether
          POSTGRES_PASSWORD: secret
          POSTGRES_DB: aether
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler postgresql-client

      - name: Apply database migrations
        continue-on-error: true
        run: |
          for f in migrations/*.sql; do
            echo "Applying $f..."
            psql "$DATABASE_URL" -f "$f" || echo "Migration $f failed (non-fatal)"
          done

      - name: Run Go stress tests
        continue-on-error: true
        id: go-stress
        run: |
          set -o pipefail
          echo "=== Go stress tests: $(grep -c 'func Test' tests/stress_go/*_test.go) test functions ==="
          go test ./tests/stress_go/ -v -count=1 -timeout=30m 2>&1 | tee go-stress-output.txt

      - name: Upload stress test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: go-stress-logs
          path: go-stress-output.txt
          retention-days: 30

  fork-tests-all:
    name: Foundry Fork Tests (426 tests)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: foundry-rs/foundry-toolchain@v1
        with:
          cache: true
          cache-key: aether-foundry-${{ runner.os }}

      - name: Restore Foundry cache
        uses: actions/cache@v4
        with:
          path: |
            contracts/cache
            contracts/out
          key: forge-cache-${{ runner.os }}-${{ hashFiles('contracts/src/**/*.sol', 'contracts/foundry.toml') }}
          restore-keys: |
            forge-cache-${{ runner.os }}-

      - name: Compile
        run: cd contracts && forge build

      - name: Run ALL fork + anvil tests
        id: forge-fork
        working-directory: contracts
        env:
          FOUNDRY_PROFILE: ci
        run: |
          set -o pipefail
          echo "=== Foundry fork + anvil tests ==="
          forge test -vvv --match-path "test/*.{fork,anvil}.t.sol" --fork-url "$ETH_RPC_URL" 2>&1 | tee ../forge-fork-output.txt
          echo "=== Fork tests complete ==="

      - name: Test summary
        if: always()
        run: |
          {
            echo "## Aether Full Test Suite Results"
            echo ""
            echo "### Foundry Fork Tests"
            echo ""
            if [ -f forge-fork-output.txt ]; then
              PASS=$(grep -c '\[PASS\]' forge-fork-output.txt || echo 0)
              FAIL=$(grep -c '\[FAIL\]' forge-fork-output.txt || echo 0)
              echo "| Status | Count |"
              echo "|--------|-------|"
              echo "| Passed | $PASS |"
              echo "| Failed | $FAIL |"
              echo ""
              if [ "$FAIL" -gt 0 ]; then
                echo "**Failed tests:**"
                echo '```'
                grep '\[FAIL\]' forge-fork-output.txt || echo "(none)"
                echo '```'
                echo ""
              fi
              grep -E '^Suite result:|^Ran [0-9]+ test' forge-fork-output.txt || true
            else
              echo "No output file found"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          if [ -f forge-fork-output.txt ] && grep -q '\[FAIL\]' forge-fork-output.txt; then
            echo "Fork tests have failures — marking job as failed"
            exit 1
          fi

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fork-test-logs-${{ github.run_id }}
          path: forge-fork-output.txt
          retention-days: 30

  unit-tests:
    name: Unit + Invariant Tests (190 tests)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: foundry-rs/foundry-toolchain@v1
        with:
          cache: true
          cache-key: aether-foundry-${{ runner.os }}

      - name: Restore Foundry cache
        uses: actions/cache@v4
        with:
          path: |
            contracts/cache
            contracts/out
          key: forge-cache-${{ runner.os }}-${{ hashFiles('contracts/src/**/*.sol', 'contracts/foundry.toml') }}
          restore-keys: |
            forge-cache-${{ runner.os }}-

      - name: Compile
        run: cd contracts && forge build

      - name: Run unit tests
        run: cd contracts && forge test -vvv --match-path "test/*.t.sol" --no-match-path "test/*.{fork,invariant,anvil}.t.sol"

      - name: Run invariant tests
        run: cd contracts && forge test -vvv --match-path "test/*.invariant.t.sol"

  final-report:
    name: Test Report
    runs-on: ubuntu-latest
    needs: [go-stress-tests, fork-tests-all, unit-tests]
    if: always()
    timeout-minutes: 5
    steps:
      - name: Aggregate results
        run: |
          {
            echo "## Aether Full Test Suite — Final Report"
            echo ""
            echo "| Job | Status |"
            echo "|-----|--------|"
            echo "| Go Stress Tests | ${{ needs.go-stress-tests.result }} |"
            echo "| Fork Tests (426) | ${{ needs.fork-tests-all.result }} |"
            echo "| Unit + Invariant (186) | ${{ needs.unit-tests.result }} |"
            echo ""
            echo "Total Foundry tests: **616** (190 unit + 426 fork/anvil)"
            echo ""
            if [ "${{ needs.fork-tests-all.result }}" = "failure" ] || [ "${{ needs.unit-tests.result }}" = "failure" ]; then
              echo "**Some tests failed — check individual job logs.**"
            else
              echo "**All Foundry tests passed.**"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
