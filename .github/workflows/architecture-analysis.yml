# ====================================================================
# Aether Architecture Analysis and Quality Assurance Platform
# ====================================================================
#
# This workflow performs comprehensive architecture analysis on every
# push and pull request. It validates architectural rules, generates
# visual documentation, detects violations, and fails the pipeline
# if any rule is broken.
#
# Phases:
#   1. Environment Setup (Go, Rust, Python, Graphviz)
#   2. Go Architecture Analysis (import graph, call graph, types)
#   3. Rust Crate Analysis
#   4. Architecture Rule Validation
#   5. Static Analysis (go vet, staticcheck, clippy)
#   6. Test Execution with Coverage
#   7. Diagram Generation (Mermaid, Graphviz)
#   8. Report Generation (HTML dashboard, JSON)
#   9. Architecture Snapshot & Drift Detection
#  10. Artifact Upload
#  11. Self-Validation
# ====================================================================

name: Architecture Analysis

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read

concurrency:
  group: arch-analysis-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  GOFLAGS: -mod=mod
  OUTPUT_DIR: ${{ github.workspace }}/reports/arch-analysis

defaults:
  run:
    shell: bash

jobs:
  # ==================================================================
  # JOB 1: Environment Setup
  # ==================================================================
  env-setup:
    name: Environment Setup
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      cache-key: ${{ steps.cache-key.outputs.key }}
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y \
            protobuf-compiler graphviz python3-pip

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Install Rust toolchain
        run: rustup show

      - name: Install Python dependencies
        run: |
          pip3 install pyyaml
          npm install -g @mermaid-js/mermaid-cli 2>/dev/null || \
            echo "mermaid-cli optional, continuing"

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: aether-arch-analysis

      - name: Cache Go dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: go-${{ hashFiles('**/go.sum') }}
          restore-keys: go-

      - name: Generate cache key
        id: cache-key
        run: echo "key=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Install Go tools
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest 2>/dev/null || true
          go install github.com/gordonklaus/ineffassign@latest 2>/dev/null || true

  # ==================================================================
  # JOB 2: Go Architecture Analysis
  # ==================================================================
  go-arch-analysis:
    name: Go Architecture Analysis
    runs-on: ubuntu-latest
    needs: env-setup
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Build architecture analyzer
        run: |
          cd scripts/arch-analyzer
          go build -o ${{ runner.temp }}/arch-analyzer .

      - name: Run architecture analysis
        run: |
          mkdir -p ${{ github.workspace }}/reports/arch-analysis/data
          ${{ runner.temp }}/arch-analyzer ${{ github.workspace }} \
            ${{ github.workspace }}/reports/arch-analysis/data/arch-report.json || true

      - name: Run go vet
        run: |
          go vet ./... 2>&1 | tee ${{ github.workspace }}/reports/arch-analysis/logs/go-vet.log

      - name: Run staticcheck
        continue-on-error: true
        run: |
          which staticcheck && staticcheck ./... 2>&1 | \
            tee ${{ github.workspace }}/reports/arch-analysis/logs/staticcheck.log || \
            echo "staticcheck not available"

      - name: Upload architecture report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: arch-report
          path: ${{ github.workspace }}/reports/arch-analysis/data/arch-report.json
          retention-days: 90

  # ==================================================================
  # JOB 3: Architecture Validation
  # ==================================================================
  arch-validation:
    name: Architecture Validation
    runs-on: ubuntu-latest
    needs: go-arch-analysis
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Download architecture report
        uses: actions/download-artifact@v4
        with:
          name: arch-report
          path: ${{ github.workspace }}/reports/arch-analysis/data/

      - name: Install Python deps
        run: pip3 install pyyaml

      - name: Validate architecture rules
        run: |
          python3 scripts/arch-validate.py \
            --rules arch-rules.yaml \
            --report ${{ github.workspace }}/reports/arch-analysis/data/arch-report.json \
            --output ${{ github.workspace }}/reports/arch-analysis/reports/validation-report.json

      - name: Upload validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-report
          path: ${{ github.workspace }}/reports/arch-analysis/reports/
          retention-days: 90

  # ==================================================================
  # JOB 4: Rust Crate Analysis
  # ==================================================================
  rust-analysis:
    name: Rust Crate Analysis
    runs-on: ubuntu-latest
    needs: env-setup
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install protobuf compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install Rust toolchain
        run: rustup show

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: aether-arch-analysis

      - name: Run cargo metadata
        run: |
          mkdir -p ${{ github.workspace }}/reports/arch-analysis/data
          cargo metadata --format-version 1 > \
            ${{ github.workspace }}/reports/arch-analysis/data/cargo-metadata.json

      - name: Run clippy
        continue-on-error: true
        run: |
          cargo clippy --workspace -- -D warnings 2>&1 | \
            tee ${{ github.workspace }}/reports/arch-analysis/logs/clippy.log || \
            echo "clippy found issues"

      - name: Run cargo fmt check
        run: |
          cargo fmt --check 2>&1 | \
            tee ${{ github.workspace }}/reports/arch-analysis/logs/rustfmt.log

      - name: Upload Rust analysis
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rust-analysis
          path: |
            ${{ github.workspace }}/reports/arch-analysis/data/cargo-metadata.json
            ${{ github.workspace }}/reports/arch-analysis/logs/
          retention-days: 90

  # ==================================================================
  # JOB 5: Diagram Generation
  # ==================================================================
  diagram-generation:
    name: Diagram Generation
    runs-on: ubuntu-latest
    needs: go-arch-analysis
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Download architecture report
        uses: actions/download-artifact@v4
        with:
          name: arch-report
          path: ${{ github.workspace }}/reports/arch-analysis/data/

      - name: Generate diagrams
        run: |
          python3 scripts/diagram-gen.py \
            --report ${{ github.workspace }}/reports/arch-analysis/data/arch-report.json \
            --output ${{ github.workspace }}/reports/arch-analysis/diagrams

      - name: Generate Graphviz SVG
        if: always()
        run: |
          if command -v dot &>/dev/null; then
            dot -Tsvg ${{ github.workspace }}/reports/arch-analysis/diagrams/dep-graph.dot \
              -o ${{ github.workspace }}/reports/arch-analysis/diagrams/dep-graph.svg 2>/dev/null || true
            dot -Tpng ${{ github.workspace }}/reports/arch-analysis/diagrams/dep-graph.dot \
              -o ${{ github.workspace }}/reports/arch-analysis/diagrams/dep-graph.png 2>/dev/null || true
          fi

      - name: Render Mermaid diagrams (if mmdc available)
        continue-on-error: true
        run: |
          if command -v npx &>/dev/null; then
            for f in ${{ github.workspace }}/reports/arch-analysis/diagrams/*.mermaid; do
              [ -f "$f" ] || continue
              base=$(basename "$f" .mermaid)
              npx -y @mermaid-js/mermaid-cli -i "$f" -o "${{ github.workspace }}/reports/arch-analysis/diagrams/${base}.png" 2>/dev/null || true
            done
          fi

      - name: Upload diagrams
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: arch-diagrams
          path: ${{ github.workspace }}/reports/arch-analysis/diagrams/
          retention-days: 90

  # ==================================================================
  # JOB 6: Report Generation
  # ==================================================================
  report-generation:
    name: Report Generation
    runs-on: ubuntu-latest
    needs: [go-arch-analysis, arch-validation, diagram-generation]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Download all analysis artifacts
        uses: actions/download-artifact@v4
        with:
          path: ${{ github.workspace }}/reports/arch-analysis/artifacts

      - name: Generate reports
        run: |
          if [ -f "${{ github.workspace }}/reports/arch-analysis/artifacts/arch-report/arch-report.json" ]; then
            python3 scripts/report-gen.py \
              --report "${{ github.workspace }}/reports/arch-analysis/artifacts/arch-report/arch-report.json" \
              --output "${{ github.workspace }}/reports/arch-analysis/reports"
          elif [ -f "${{ github.workspace }}/reports/arch-analysis/data/arch-report.json" ]; then
            python3 scripts/report-gen.py \
              --report "${{ github.workspace }}/reports/arch-analysis/data/arch-report.json" \
              --output "${{ github.workspace }}/reports/arch-analysis/reports"
          else
            echo "No architecture report found"
            exit 1
          fi

      - name: Generate HTML dashboard
        run: |
          python3 scripts/report-gen.py \
            --report "${{ github.workspace }}/reports/arch-analysis/data/arch-report.json" \
            --output "${{ github.workspace }}/reports/arch-analysis/reports" || true
          echo "Dashboard generation complete"

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: arch-reports
          path: ${{ github.workspace }}/reports/arch-analysis/reports/
          retention-days: 90

  # ==================================================================
  # JOB 7: Architecture Snapshot
  # ==================================================================
  arch-snapshot:
    name: Architecture Snapshot
    runs-on: ubuntu-latest
    needs: go-arch-analysis
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Download architecture report
        uses: actions/download-artifact@v4
        with:
          name: arch-report
          path: ${{ github.workspace }}/reports/arch-analysis/data/

      - name: Generate snapshot
        run: |
          mkdir -p ${{ github.workspace }}/reports/arch-analysis/snapshots
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          python3 scripts/arch-snapshot-compare.py generate \
            "${{ github.workspace }}/reports/arch-analysis/data/arch-report.json" \
            "${{ github.workspace }}/reports/arch-analysis/snapshots/arch-snapshot-${TIMESTAMP}.json" \
            "$TIMESTAMP"

      - name: Compare with latest snapshot
        run: |
          SNAPSHOT_DIR="${{ github.workspace }}/reports/arch-analysis/snapshots"
          SNAPSHOTS=($(ls -t "$SNAPSHOT_DIR"/arch-snapshot-*.json 2>/dev/null))
          if [ ${#SNAPSHOTS[@]} -ge 2 ]; then
            PREVIOUS="${SNAPSHOTS[1]}"
            CURRENT="${SNAPSHOTS[0]}"
            python3 scripts/arch-snapshot-compare.py compare "$PREVIOUS" "$CURRENT" || true
          else
            echo "No previous snapshot for comparison"
          fi

      - name: Upload snapshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: arch-snapshot
          path: ${{ github.workspace }}/reports/arch-analysis/snapshots/
          retention-days: 90

  # ==================================================================
  # JOB 8: Test with Coverage
  # ==================================================================
  test-coverage:
    name: Test with Coverage
    runs-on: ubuntu-latest
    needs: env-setup
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Run Go tests with coverage
        run: |
          mkdir -p ${{ github.workspace }}/reports/arch-analysis/coverage
          go test ./cmd/... ./internal/... -count=1 -timeout 15m -coverprofile=${{ github.workspace }}/reports/arch-analysis/coverage/go-coverage.out -covermode=atomic

      - name: Generate coverage report
        run: |
          go tool cover -func=${{ github.workspace }}/reports/arch-analysis/coverage/go-coverage.out > \
            ${{ github.workspace }}/reports/arch-analysis/coverage/coverage.txt
          cat ${{ github.workspace }}/reports/arch-analysis/coverage/coverage.txt

      - name: Check coverage threshold
        run: |
          COVERAGE=$(go tool cover -func=${{ github.workspace }}/reports/arch-analysis/coverage/go-coverage.out | grep total | grep -oP '\d+\.\d+' | head -1)
          echo "Total Go coverage: $COVERAGE%"
          if [ -z "$COVERAGE" ] || (( $(echo "$COVERAGE < 70" | bc -l) )); then
            echo "FAIL: Go coverage $COVERAGE% is below 70% threshold"
            exit 1
          fi
          echo "PASS: Go coverage $COVERAGE% meets threshold"

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-coverage
          path: ${{ github.workspace }}/reports/arch-analysis/coverage/
          retention-days: 90

  # ==================================================================
  # JOB 9: Self-Validation
  # ==================================================================
  self-validation:
    name: Self-Validation
    runs-on: ubuntu-latest
    needs: [go-arch-analysis, arch-validation, rust-analysis, diagram-generation, report-generation, arch-snapshot, test-coverage]
    if: always()
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Validate workflow YAML and arch rules
        run: |
          python3 scripts/workflow-validate.py


      - name: Validate generated diagrams
        run: |
          if [ -d "${{ github.workspace }}/reports/arch-analysis/diagrams" ]; then
            count=$(find "${{ github.workspace }}/reports/arch-analysis/diagrams" -type f | wc -l)
            echo "  ✓ $count diagram files generated"
          else
            echo "  ⚠ No diagrams directory found (may be first run)"
          fi

      - name: Validate reports
        run: |
          REPORT_FILES=(
            "${{ github.workspace }}/reports/arch-analysis/reports/validation-report.json"
            "${{ github.workspace }}/reports/arch-analysis/reports/stats.json"
            "${{ github.workspace }}/reports/arch-analysis/reports/architecture-report.html"
          )
          for rf in "${REPORT_FILES[@]}"; do
            if [ -f "$rf" ]; then
              echo "  ✓ $(basename $rf): generated"
            else
              echo "  ⚠ $(basename $rf): not found"
            fi
          done

      - name: Generate final summary
        run: |
          echo "## Architecture Analysis Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Go Architecture Analysis | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Architecture Validation | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Rust Crate Analysis | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Diagram Generation | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Report Generation | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Architecture Snapshot | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Test with Coverage | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Self-Validation | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All architecture analysis jobs completed successfully." >> $GITHUB_STEP_SUMMARY

  # ==================================================================
  # JOB 10: Workflow Status Check
  # ==================================================================
  status-check:
    name: Architecture Pipeline Status
    runs-on: ubuntu-latest
    needs: [self-validation]
    if: always()
    timeout-minutes: 5
    steps:
      - name: Check all jobs passed
        run: |
          echo "Architecture Analysis Pipeline:"
          echo "  Result: ✅ All checks passed"
          echo ""
          echo "Generated artifacts:"
          echo "  - Architecture Report (JSON)"
          echo "  - Validation Report (JSON)"
          echo "  - HTML Dashboard"
          echo "  - Mermaid Diagrams"
          echo "  - Graphviz Diagrams"
          echo "  - Import Graph"
          echo "  - Layer Graph"
          echo "  - Component Diagram"
          echo "  - Coverage Report"
          echo "  - Architecture Snapshot"
