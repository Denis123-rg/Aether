name: Aether E2E Tests (Sepolia + Full Stack)

on:
  workflow_dispatch:
    inputs:
      timeout:
        description: 'Таймаут выполнения (минуты)'
        required: true
        default: '15'
        type: choice
        options:
          - '15'
          - '120'
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: read

concurrency:
  group: aether-e2e-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  COMPOSE_FILE: docker-compose.ci.yml

jobs:
  full-e2e:
    name: Aether E2E (${{ github.event.inputs.timeout || '15' }} мин)
    runs-on: ubuntu-latest
    timeout-minutes: ${{ fromJSON(github.event.inputs.timeout || '15') }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ hashFiles('package.json') }}
          restore-keys: |
            npm-

      - name: Install test dependencies
        run: npm install ethers

      # ---------- Деплой контракта на Sepolia ----------
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Build and deploy contract
        id: deploy
        run: |
          cd contracts
          forge build
          DEPLOY_OUTPUT=$(forge create --rpc-url ${{ secrets.SEPOLIA_RPC_URL }} \
            --private-key ${{ secrets.METAMASK_PRIVATE_KEY }} \
            src/AetherExecutor.sol:AetherExecutor \
            --broadcast)
          CONTRACT_ADDRESS=$(echo "$DEPLOY_OUTPUT" | grep -oP 'Deployed to: \K(0x[a-fA-F0-9]{40})')
          echo "contract_address=$CONTRACT_ADDRESS" >> $GITHUB_OUTPUT
          echo "✅ Contract deployed to $CONTRACT_ADDRESS"

      - name: Extract ABI from compiled contract
        id: abi
        run: |
          ABI_FILE="contracts/out/AetherExecutor.sol/AetherExecutor.json"
          if [ ! -f "$ABI_FILE" ]; then
            ABI_FILE="contracts/out/AetherExecutor.json"
          fi
          ABI=$(jq -c '.abi' "$ABI_FILE")
          echo "abi=$ABI" >> $GITHUB_OUTPUT
          echo "✅ ABI extracted"

      # ---------- Запуск бэкенда ----------
      - name: Start backend services (Rust + Go + Postgres + MinIO)
        run: |
          docker-compose -f ${{ env.COMPOSE_FILE }} up -d
          timeout 120 bash -c 'until curl -s http://localhost:3000/health; do sleep 2; done'
          echo "✅ All backend services are ready"

      # ---------- Запуск E2E-тестов ----------
      - name: Run Full E2E Tests
        env:
          SEPOLIA_RPC_URL: ${{ secrets.SEPOLIA_RPC_URL }}
          METAMASK_PRIVATE_KEY: ${{ secrets.METAMASK_PRIVATE_KEY }}
          METAMASK_ADDRESS: ${{ secrets.METAMASK_ADDRESS }}
          CONTRACT_ADDRESS: ${{ steps.deploy.outputs.contract_address }}
          CONTRACT_ABI: ${{ steps.abi.outputs.abi }}
          BACKEND_URL: http://localhost:3000
          BACKEND_API_KEY: ${{ secrets.BACKEND_API_KEY }}
          S3_ENDPOINT: http://localhost:9000
          S3_ACCESS_KEY: minioadmin
          S3_SECRET_KEY: minioadmin
          S3_BUCKET: aether-test
          TIMEOUT_MINUTES: ${{ github.event.inputs.timeout || '15' }}
          REPORT_DIR: /tmp/aether-report
        run: node scripts/e2e-fullstack.mjs

      # ---------- Сбор логов и артефактов ----------
      - name: Collect container logs
        if: always()
        run: |
          docker-compose -f ${{ env.COMPOSE_FILE }} logs > /tmp/container-logs.txt
          docker-compose -f ${{ env.COMPOSE_FILE }} down

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aether-e2e-reports-${{ github.event.inputs.timeout || '15' }}
          path: |
            /tmp/aether-report/
            /tmp/container-logs.txt
          retention-days: 30
