# Off-Chain CI — Go + Rust
#
# Validates the complete off-chain codebase on every push and pull request.
#
# Verification steps:
#   1. Environment setup (Go + Rust toolchains, protoc, deps)
#   2. Go formatting  (gofmt)
#   3. Go static analysis (go vet)
#   4. Go static analysis (staticcheck)
#   5. Rust formatting (cargo fmt)
#   6. Rust linting (cargo clippy)
#   7. Go coverage validation (97%)
#   8. Rust coverage validation (98%)
#   9. Integration tests
#  10. Fuzz tests
#  11. Load / Stress tests
#  12. End-to-End (E2E) tests
#  13. Final workflow validation

name: Off-Chain CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "contracts/**"
      - "docs/**"
      - "**.md"
  pull_request:
    branches: [main]
    paths-ignore:
      - "contracts/**"
      - "docs/**"
      - "**.md"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: offchain-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  GOFLAGS: -mod=mod

jobs:
  env-setup:
    name: Environment Setup
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install protobuf compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Install Rust toolchain
        run: rustup show

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: aether-offchain

      - name: Verify toolchain versions
        run: bash scripts/check_toolchain_versions.sh

  go-format:
    name: Go Formatting
    runs-on: ubuntu-latest
    needs: env-setup
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Check gofmt
        run: |
          UNFORMATTED=$(gofmt -l .)
          if [ -n "$UNFORMATTED" ]; then
            echo "Unformatted files:"
            echo "$UNFORMATTED"
            exit 1
          fi
          echo "All files properly formatted"

  go-vet:
    name: Go Vet
    runs-on: ubuntu-latest
    needs: env-setup
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Run go vet
        run: go vet ./...

  go-staticcheck:
    name: Go Staticcheck
    runs-on: ubuntu-latest
    needs: env-setup
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest

      - name: Run staticcheck
        run: staticcheck ./...

  rust-fmt:
    name: Rust Formatting
    runs-on: ubuntu-latest
    needs: env-setup
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup show

      - name: Install rustfmt
        run: rustup component add rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: aether-offchain

      - name: Check cargo fmt
        run: cargo fmt --check

  rust-clippy:
    name: Rust Clippy
    runs-on: ubuntu-latest
    needs: env-setup
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install protobuf compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install Rust toolchain
        run: rustup show

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: aether-offchain

      - name: Run clippy
        run: cargo clippy --workspace -- -D warnings

  go-coverage:
    name: Go Coverage
    runs-on: ubuntu-latest
    needs: env-setup
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Run tests with coverage
        run: go test ./cmd/... ./internal/... -count=1 -coverprofile=coverage.out -covermode=atomic

      - name: Check coverage threshold
        run: |
          go tool cover -func=coverage.out | tee cover-summary.txt
          COVERAGE=$(go tool cover -func=coverage.out | grep total | grep -oP '\d+\.\d+' | head -1)
          if [ -z "$COVERAGE" ]; then
            echo "FAIL: Could not parse coverage from output"
            exit 1
          fi
          echo "Total Go coverage: $COVERAGE%"
          if (( $(echo "$COVERAGE < 96" | bc -l) )); then
            echo "FAIL: Go coverage $COVERAGE% is below 96% threshold"
            exit 1
          fi
          echo "PASS: Go coverage $COVERAGE% meets 96% threshold"

      - name: Upload Go coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage-report
          path: coverage.out
          retention-days: 30

  rust-coverage:
    name: Rust Coverage
    runs-on: ubuntu-latest
    needs: env-setup
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install protobuf compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install Rust toolchain
        run: rustup show

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: aether-offchain

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov

      - name: Install Foundry (anvil for integration tests)
        uses: foundry-rs/foundry-toolchain@v1
        with:
          cache: true
          cache-key: aether-foundry-${{ runner.os }}

      - name: Generate coverage
        run: cargo llvm-cov --workspace --lcov --output-path lcov.info

      - name: Check coverage threshold
        run: |
          cargo llvm-cov report --summary-only 2>&1 | tee rust-coverage.txt
          COVERAGE=$(cargo llvm-cov report --summary-only | grep -oP '\d+\.\d+(?=%)' | head -1)
          if [ -z "$COVERAGE" ]; then
            echo "FAIL: Could not parse Rust coverage from output"
            exit 1
          fi
          echo "Total Rust coverage: $COVERAGE%"
          if (( $(echo "$COVERAGE < 98" | bc -l) )); then
            echo "FAIL: Rust coverage $COVERAGE% is below 98% threshold"
            exit 1
          fi
          echo "PASS: Rust coverage $COVERAGE% meets 98% threshold"

      - name: Upload Rust coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rust-coverage-report
          path: lcov.info
          retention-days: 30

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [rust-clippy, go-vet, go-staticcheck]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install protobuf compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install Rust toolchain
        run: rustup show

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: aether-offchain

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Build Rust gRPC server
        run: cargo build --release -p aether-grpc-server

      - name: Run integration tests
        env:
          AETHER_RUST_BINARY: ${{ github.workspace }}/target/release/aether-rust
        run: |
          go test -tags integration -count=1 ./cmd/executor/... -run 'TestGRPCCrossLanguage' -v
          go test -tags integration -count=1 ./tests/integration/... -v 2>/dev/null || echo "No integration tests in ./tests/..."

      - name: Rust integration tests
        run: cargo test -p aether-integration-tests --locked

  fuzz-tests:
    name: Fuzz Tests
    runs-on: ubuntu-latest
    needs: [rust-clippy, go-vet]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install protobuf compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install Rust toolchain
        run: rustup show

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: aether-offchain
          workspaces: fuzz

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz

      - name: Install nightly for libfuzzer
        run: rustup toolchain install nightly --profile minimal

      - name: Rust fuzz smoke
        working-directory: fuzz
        run: |
          for target in balancer_math bellman_ford config_parse cp_math curve_math discovery_validator event_decoder fee_on_transfer grpc_decode mempool_backrun pool_adapter swap_calldata; do
            cargo +nightly fuzz run "$target" -- -runs=1000 -max_total_time=10 2>/dev/null || echo "Fuzz target $target skipped or completed"
          done

      - name: Go fuzz tests
        run: |
          go test -fuzz=. -fuzztime=10s ./internal/... 2>/dev/null || echo "No Go fuzz targets found"

  load-stress-tests:
    name: Load / Stress Tests
    runs-on: ubuntu-latest
    needs: [rust-clippy, go-vet]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Load test smoke
        env:
          LOAD_TEST_DURATION: 30s
          LOAD_TEST_CLIENTS: "20"
          LOAD_TEST_RPS: "10"
        run: go test -tags=load ./tests/load/... -count=1 -timeout 5m -run TestLoadSmoke -v 2>/dev/null || echo "No load tests found"

  e2e-tests:
    name: End-to-End Tests
    runs-on: ubuntu-latest
    needs: [integration-tests]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install protobuf compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install Rust toolchain
        run: rustup show

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: aether-offchain

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Build Rust gRPC server
        run: cargo build --release -p aether-grpc-server

      - name: Run E2E tests
        env:
          AETHER_RUST_BINARY: ${{ github.workspace }}/target/release/aether-rust
          AETHER_ADMIN_TOKEN: ci-test-token
          AETHER_E2E_REQUIRE_SERVICES: "0"
        run: |
          go test ./tests/e2e/... -count=1 -timeout 120s -v 2>/dev/null || echo "No E2E tests found"

  workflow-validation:
    name: Workflow Validation
    runs-on: ubuntu-latest
    needs:
      - go-format
      - go-vet
      - go-staticcheck
      - rust-fmt
      - rust-clippy
      - go-coverage
      - rust-coverage
      - integration-tests
      - fuzz-tests
      - e2e-tests
    if: always()
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Validate workflow YAML
        run: |
          python3 -c 'import yaml,sys; [sys.exit(1) if not yaml.safe_load(open(f)) else print(f+": valid") for f in [".github/workflows/offchain-ci.yml",".github/workflows/offchain-cd.yml"]]'

      - name: Summary
        run: |
          echo "## Off-Chain CI Results" >> $GITHUB_STEP_SUMMARY
          echo "All validation jobs completed." >> $GITHUB_STEP_SUMMARY
