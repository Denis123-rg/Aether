name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  toolchain:
    name: toolchain
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check toolchain versions
        run: bash scripts/check_toolchain_versions.sh

  rust:
    name: rust
    runs-on: ubuntu-latest
    needs: toolchain
    steps:
      - uses: actions/checkout@v4

      - name: Install protobuf compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install Rust toolchain
        run: rustup show

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: aether-rust

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Tests
        run: cargo test --workspace --locked

  go:
    name: go
    runs-on: ubuntu-latest
    needs: toolchain
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Vet
        run: go vet ./...

      - name: Factory coverage validation
        run: bash scripts/validate_factory_coverage.sh

      - name: Production hardening checks
        run: bash scripts/test_production_hardening.sh

      - name: Unit tests (with coverage)
        run: go test ./... -count=1 -coverprofile=coverage.out

      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -30

  go-integration:
    name: go-integration
    runs-on: ubuntu-latest
    needs: [rust, go]
    steps:
      - uses: actions/checkout@v4

      - name: Install protobuf compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install Rust toolchain
        run: rustup show

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: aether-rust

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Build Rust gRPC server
        run: cargo build --release -p aether-grpc-server

      - name: Cross-language integration tests
        env:
          AETHER_RUST_BINARY: ${{ github.workspace }}/target/release/aether-rust
        run: |
          go test -tags integration -count=1 ./cmd/executor/... -run 'TestGRPCCrossLanguage' -v
          go test -tags integration -count=1 ./tests/integration/... -v

  go-postgres:
    name: go-postgres (testcontainers)
    runs-on: ubuntu-latest
    needs: toolchain
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Postgres integration tests
        run: go test ./internal/db/... -count=1 -run TestPostgres -v

  fork-tests:
    name: rust-fork-tests
    runs-on: ubuntu-latest
    needs: [rust, go]
    # Fork tests require a mainnet RPC endpoint. The secret is optional;
    # when absent the runner script exits cleanly with a skip notice.
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install protobuf compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install Rust toolchain
        run: rustup show

      - uses: foundry-rs/foundry-toolchain@v1
        with:
          cache: true
          cache-key: aether-foundry-${{ runner.os }}

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: aether-rust

      - name: Run fork tests
        env:
          ETH_RPC_URL: ${{ secrets.ETH_RPC_URL }}
        run: bash scripts/run_fork_tests.sh

  fuzz-nightly:
    name: fuzz-nightly
    runs-on: ubuntu-latest
    needs: toolchain
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Install protobuf compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install Rust toolchain
        run: rustup show

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: aether-rust
          workspaces: fuzz

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz

      - name: Install nightly for libfuzzer
        run: rustup toolchain install nightly --profile minimal

      - name: Fuzz smoke (all targets, 1000 iterations)
        working-directory: fuzz
        run: |
          for target in balancer_math bellman_ford config_parse cp_math curve_math discovery_validator event_decoder fee_on_transfer grpc_decode mempool_backrun pool_adapter swap_calldata; do
            cargo +nightly fuzz run "$target" -- -runs=1000 -max_total_time=10
          done

      - name: Fuzz check (compile-only smoke)
        working-directory: fuzz
        run: cargo check

  solidity:
    name: solidity
    runs-on: ubuntu-latest
    needs: toolchain
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: foundry-rs/foundry-toolchain@v1
        with:
          cache: true
          cache-key: aether-foundry-${{ runner.os }}

      - name: Tests
        working-directory: contracts
        run: forge test -vvv

      - name: Fuzz smoke
        working-directory: contracts
        run: forge test --fuzz-runs 1000 -vvv

  load-test:
    name: load-test
    runs-on: ubuntu-latest
    needs: toolchain
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Load test smoke
        env:
          LOAD_TEST_DURATION: 30s
          LOAD_TEST_CLIENTS: "20"
          LOAD_TEST_RPS: "10"
        run: go test -tags=load ./tests/load/... -count=1 -timeout 5m -run TestLoadSmoke -v

  e2e-smoke:
    name: e2e-smoke
    runs-on: ubuntu-latest
    needs: [rust, go]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Install Rust toolchain
        run: rustup show

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: aether-rust

      - name: Build Rust gRPC server
        run: cargo build --release -p aether-grpc-server

      - name: E2E smoke (parser + health)
        env:
          AETHER_RUST_BINARY: ${{ github.workspace }}/target/release/aether-rust
        run: go test ./tests/e2e/... -count=1 -run 'TestParse|TestHealthEndpoint' -timeout 60s -v
