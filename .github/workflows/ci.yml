name: On-Chain CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FOUNDRY_PROFILE: ci

defaults:
  run:
    working-directory: contracts

jobs:
  checkout:
    name: Checkout
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

  install-foundry:
    name: Install Foundry
    runs-on: ubuntu-latest
    needs: checkout
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: foundry-rs/foundry-toolchain@v1
        with:
          cache: true
          cache-key: aether-foundry-${{ runner.os }}

      - name: Verify installation
        run: |
          forge --version
          cast --version
          anvil --version

  install-deps:
    name: Install Dependencies
    runs-on: ubuntu-latest
    needs: install-foundry
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: foundry-rs/foundry-toolchain@v1
        with:
          cache: true
          cache-key: aether-foundry-${{ runner.os }}

      - name: Install Foundry dependencies
        run: forge install

      - name: Verify dependencies
        run: |
          forge remappings > /dev/null
          echo "Dependencies installed successfully"

  compile:
    name: Compile
    runs-on: ubuntu-latest
    needs: install-deps
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: foundry-rs/foundry-toolchain@v1
        with:
          cache: true
          cache-key: aether-foundry-${{ runner.os }}

      - name: Restore Foundry cache
        uses: actions/cache@v4
        with:
          path: |
            contracts/cache
            contracts/out
          key: forge-cache-${{ runner.os }}-${{ hashFiles('contracts/src/**/*.sol', 'contracts/foundry.toml') }}
          restore-keys: |
            forge-cache-${{ runner.os }}-

      - name: Forge build
        run: forge build

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: compile
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: foundry-rs/foundry-toolchain@v1
        with:
          cache: true
          cache-key: aether-foundry-${{ runner.os }}

      - name: Restore Foundry cache
        uses: actions/cache@v4
        with:
          path: |
            contracts/cache
            contracts/out
          key: forge-cache-${{ runner.os }}-${{ hashFiles('contracts/src/**/*.sol', 'contracts/foundry.toml') }}
          restore-keys: |
            forge-cache-${{ runner.os }}-

      - name: Run unit tests
        run: forge test -vvv --match-path "test/*.t.sol" --no-match-path "test/*.{fork,invariant}.t.sol"

      - name: Run invariant tests
        run: forge test -vvv --match-path "test/*.invariant.t.sol"

      - name: Upload forge logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: forge-logs
          path: contracts/out/**/*.json
          retention-days: 7

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: compile
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: foundry-rs/foundry-toolchain@v1
        with:
          cache: true
          cache-key: aether-foundry-${{ runner.os }}

      - name: Restore Foundry cache
        uses: actions/cache@v4
        with:
          path: |
            contracts/cache
            contracts/out
          key: forge-cache-${{ runner.os }}-${{ hashFiles('contracts/src/**/*.sol', 'contracts/foundry.toml') }}
          restore-keys: |
            forge-cache-${{ runner.os }}-

      - name: Generate coverage report
        run: |
          forge coverage --report lcov --no-match-path "test/*.fork.t.sol"
          forge coverage --report summary --no-match-path "test/*.fork.t.sol"

      - name: Check coverage threshold
        run: |
          forge coverage --report summary --no-match-path "test/*.fork.t.sol" > coverage_summary.txt 2>&1
          cat coverage_summary.txt
          COVERAGE=$(grep "^| Total" coverage_summary.txt | grep -oP '\d+\.\d+(?=%)' | head -1)
          if [ -z "$COVERAGE" ]; then
            echo "Failed to parse coverage output"
            exit 1
          fi
          echo "Coverage: $COVERAGE%"
          if (( $(echo "$COVERAGE < 70" | bc -l) )); then
            echo "FAIL: Coverage $COVERAGE% is below 70% threshold"
            exit 1
          fi
          echo "PASS: Coverage $COVERAGE% meets 70% threshold"

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: contracts/lcov.info
          retention-days: 30

  slither:
    name: Slither Analysis
    runs-on: ubuntu-latest
    needs: compile
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Slither
        run: pip install slither-analyzer

      - name: Run Slither
        run: |
          slither . --filter-paths "lib,test,script" --exclude-dependencies \
            --exclude naming-convention \
            --fail-high --fail-medium \
            --json slither-report.json 2>&1 | tee slither-output.txt

      - name: Upload Slither report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: slither-report
          path: contracts/slither-report.json
          retention-days: 30

  solhint:
    name: Solhint
    runs-on: ubuntu-latest
    needs: compile
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Solhint
        run: npm install -g solhint

      - name: Run Solhint
        run: solhint 'src/**/*.sol'

  semgrep:
    name: Semgrep
    runs-on: ubuntu-latest
    needs: compile
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep
        continue-on-error: true
        run: |
          semgrep --config=p/solidity \
            --output=semgrep-report.json --json \
            --exclude='lib/**' --exclude='test/**' --exclude='script/**' \
            src/

      - name: Upload Semgrep report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-report
          path: contracts/semgrep-report.json
          retention-days: 30

  echidna:
    name: Echidna Fuzzing
    runs-on: ubuntu-latest
    needs: compile
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: foundry-rs/foundry-toolchain@v1
        with:
          cache: true
          cache-key: aether-foundry-${{ runner.os }}

      - name: Install Echidna
        continue-on-error: true
        run: |
          curl -L https://github.com/crytic/echidna/releases/latest/download/echidna-2.2.5-Ubuntu-22.04.tar.gz -o echidna.tar.gz
          tar -xzf echidna.tar.gz
          find . -name "echidna*" -type f -executable 2>/dev/null | head -5
          if [ -f "echidna" ]; then
            sudo mv echidna /usr/local/bin/
          elif [ -d "echidna" ]; then
            sudo mv echidna/echidna /usr/local/bin/ 2>/dev/null || sudo mv echidna/* /usr/local/bin/
          fi
          command -v echidna && echidna --version || echo "Echidna not available, will skip tests"

      - name: Run Echidna
        working-directory: contracts
        run: |
          echidna test/echidna/EchidnaAether.sol \
            --contract EchidnaAether \
            --config echidna.yaml \
            --test-limit 50000 \
            --seq-len 50 \
            --format text 2>&1 | tee echidna-output.txt

      - name: Check Echidna results
        run: |
          if grep -qi "FAILED\|failing\|assertion failed\|[FAIL]" echidna-output.txt; then
            echo "Echidna found violations"
            cat echidna-output.txt
            exit 1
          fi
          echo "All Echidna properties passed"

      - name: Upload Echidna results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: echidna-report
          path: contracts/echidna-output.txt
          retention-days: 30

  fork-tests:
    name: Anvil Fork Tests
    runs-on: ubuntu-latest
    needs: compile
    timeout-minutes: 30
    env:
      ETH_RPC_URL: ${{ secrets.ETH_RPC_URL }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: foundry-rs/foundry-toolchain@v1
        with:
          cache: true
          cache-key: aether-foundry-${{ runner.os }}

      - name: Restore Foundry cache
        uses: actions/cache@v4
        with:
          path: |
            contracts/cache
            contracts/out
          key: forge-cache-${{ runner.os }}-${{ hashFiles('contracts/src/**/*.sol', 'contracts/foundry.toml') }}
          restore-keys: |
            forge-cache-${{ runner.os }}-

      - name: Check ETH_RPC_URL
        id: check_rpc
        run: |
          if [ -z "$ETH_RPC_URL" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "ETH_RPC_URL not set — skipping fork tests"
          fi

      - name: Start Anvil fork
        if: steps.check_rpc.outputs.skip != 'true'
        run: |
          anvil --fork-url "$ETH_RPC_URL" --fork-block-number 19800000 --silent &
          ANVIL_PID=$!
          echo "Anvil PID: $ANVIL_PID"
          sleep 5
          curl -s -o /dev/null -w "%{http_code}" http://localhost:8545 || exit 1
          echo "Anvil ready"

      - name: Run fork tests
        if: steps.check_rpc.outputs.skip != 'true'
        run: forge test -vvv --match-path "test/*.fork.t.sol" --fork-url http://localhost:8545

      - name: Stop Anvil
        if: always()
        run: pkill anvil || true
