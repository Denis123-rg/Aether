name: On-Chain CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FOUNDRY_PROFILE: ci
  ETH_RPC_URL: https://ethereum-rpc.publicnode.com

jobs:
  unit-and-invariant-tests:
    name: Unit + Invariant Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: foundry-rs/foundry-toolchain@v1
        with:
          cache: true
          cache-key: aether-foundry-${{ runner.os }}

      - name: Restore Foundry cache
        uses: actions/cache@v4
        with:
          path: |
            contracts/cache
            contracts/out
          key: forge-cache-${{ runner.os }}-${{ hashFiles('contracts/src/**/*.sol', 'contracts/foundry.toml') }}
          restore-keys: |
            forge-cache-${{ runner.os }}-

      - name: Compile
        working-directory: contracts
        run: forge build

      - name: Run unit tests (mock-based)
        working-directory: contracts
        run: forge test -vvv --match-path "test/*.t.sol" --no-match-path "test/*.{fork,invariant,anvil}.t.sol"

      - name: Run invariant tests
        working-directory: contracts
        run: forge test -vvv --match-path "test/*.invariant.t.sol"

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-logs
          path: contracts/out/**/*.json
          retention-days: 7

  anvil-fork-tests:
    name: Anvil Fork Tests (107 tests)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: foundry-rs/foundry-toolchain@v1
        with:
          cache: true
          cache-key: aether-foundry-${{ runner.os }}

      - name: Restore Foundry cache
        uses: actions/cache@v4
        with:
          path: |
            contracts/cache
            contracts/out
          key: forge-cache-${{ runner.os }}-${{ hashFiles('contracts/src/**/*.sol', 'contracts/foundry.toml') }}
          restore-keys: |
            forge-cache-${{ runner.os }}-

      - name: Compile
        working-directory: contracts
        run: forge build

      - name: Run Anvil fork tests
        working-directory: contracts
        run: forge test -vvv --match-path "test/AetherExecutor.anvil.t.sol" --fork-url "$ETH_RPC_URL"

  fork-group-tests:
    name: Fork Tests Groups A-L (319 tests)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: foundry-rs/foundry-toolchain@v1
        with:
          cache: true
          cache-key: aether-foundry-${{ runner.os }}

      - name: Restore Foundry cache
        uses: actions/cache@v4
        with:
          path: |
            contracts/cache
            contracts/out
          key: forge-cache-${{ runner.os }}-${{ hashFiles('contracts/src/**/*.sol', 'contracts/foundry.toml') }}
          restore-keys: |
            forge-cache-${{ runner.os }}-

      - name: Compile
        working-directory: contracts
        run: forge build

      - name: Run fork test groups A-L
        working-directory: contracts
        run: forge test -vvv --match-path "test/AetherExecutor.fork.group*.t.sol" --fork-url "$ETH_RPC_URL"

      - name: Run base fork tests
        working-directory: contracts
        run: forge test -vvv --match-path "test/AetherExecutor.fork.t.sol" --fork-url "$ETH_RPC_URL"

  fork-group-adapters:
    name: Fork Tests Group C — DEX Adapters (53 tests)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: foundry-rs/foundry-toolchain@v1
        with:
          cache: true
          cache-key: aether-foundry-${{ runner.os }}

      - name: Restore Foundry cache
        uses: actions/cache@v4
        with:
          path: |
            contracts/cache
            contracts/out
          key: forge-cache-${{ runner.os }}-${{ hashFiles('contracts/src/**/*.sol', 'contracts/foundry.toml') }}
          restore-keys: |
            forge-cache-${{ runner.os }}-

      - name: Compile
        working-directory: contracts
        run: forge build

      - name: Run Group C — DEX Adapters
        working-directory: contracts
        run: forge test -vvv --match-path "test/AetherExecutor.fork.groupC_adapters.t.sol" --fork-url "$ETH_RPC_URL"

  coverage:
    name: Coverage Report
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: foundry-rs/foundry-toolchain@v1
        with:
          cache: true
          cache-key: aether-foundry-${{ runner.os }}

      - name: Restore Foundry cache
        uses: actions/cache@v4
        with:
          path: |
            contracts/cache
            contracts/out
          key: forge-cache-${{ runner.os }}-${{ hashFiles('contracts/src/**/*.sol', 'contracts/foundry.toml') }}
          restore-keys: |
            forge-cache-${{ runner.os }}-

      - name: Generate coverage report
        working-directory: contracts
        run: |
          forge coverage --report lcov --no-match-path "test/*.{fork,anvil}.t.sol"
          forge coverage --report summary --no-match-path "test/*.{fork,anvil}.t.sol"

      - name: Check coverage threshold
        working-directory: contracts
        run: |
          forge coverage --report summary --no-match-path "test/*.{fork,anvil}.t.sol" > coverage_summary.txt 2>&1
          cat coverage_summary.txt
          COVERAGE=$(grep -oP '\d+\.\d+(?=%)' coverage_summary.txt | head -1)
          if [ -z "$COVERAGE" ]; then
            echo "Failed to parse coverage output — non-blocking"
          else
            echo "Coverage: $COVERAGE%"
            if (( $(echo "$COVERAGE < 60" | bc -l) )); then
              echo "WARN: Coverage $COVERAGE% is below 60% threshold"
            else
              echo "PASS: Coverage $COVERAGE% meets 60% threshold"
            fi
          fi

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: contracts/lcov.info
          retention-days: 30

  slither:
    name: Slither Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Slither
        run: pip install slither-analyzer

      - name: Install Foundry (for solc)
        uses: foundry-rs/foundry-toolchain@v1
        with:
          cache: true
          cache-key: aether-foundry-${{ runner.os }}

      - name: Run Slither
        working-directory: contracts
        run: |
          slither . --filter-paths "lib,test,script" --exclude-dependencies \
            --exclude naming-convention \
            --fail-high \
            --json slither-report.json 2>&1 | tee slither-output.txt

      - name: Upload Slither report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: slither-report
          path: contracts/slither-report.json
          retention-days: 30

  solhint:
    name: Solhint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Solhint
        run: npm install -g solhint

      - name: Run Solhint
        working-directory: contracts
        run: solhint 'src/**/*.sol'

  echidna:
    name: Echidna Fuzzing
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: foundry-rs/foundry-toolchain@v1
        with:
          cache: true
          cache-key: aether-foundry-${{ runner.os }}

      - name: Install Echidna
        run: |
          curl -L https://github.com/crytic/echidna/releases/download/v2.3.2/echidna-2.3.2-x86_64-linux.tar.gz -o echidna.tar.gz
          tar -xzf echidna.tar.gz
          sudo mv echidna /usr/local/bin/
          echidna --version

      - name: Install crytic-compile
        run: pip install crytic-compile

      - name: Run Echidna
        working-directory: contracts
        run: |
          echidna test/echidna/EchidnaAether.sol \
            --contract EchidnaAether \
            --config echidna.yaml \
            --test-limit 50000 \
            --seq-len 50 \
            --format text 2>&1 | tee echidna-output.txt

      - name: Check Echidna results
        working-directory: contracts
        run: |
          if grep -q "FAILED\|assertion failed\|\[FAIL\]" echidna-output.txt; then
            echo "Echidna found violations"
            cat echidna-output.txt
            exit 1
          fi
          echo "All Echidna properties passed"

      - name: Upload Echidna results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: echidna-report
          path: contracts/echidna-output.txt
          retention-days: 30
