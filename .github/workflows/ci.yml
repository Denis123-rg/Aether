name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  toolchain:
    name: toolchain
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check toolchain versions
        run: bash scripts/check_toolchain_versions.sh

  rust:
    name: rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install protobuf compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install Rust toolchain
        run: rustup show

      - uses: Swatinem/rust-cache@v2

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Tests
        run: cargo test --workspace

  go:
    name: go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Vet
        run: go vet ./...

      - name: Tests (with coverage)
        run: go test ./... -count=1 -coverprofile=coverage.out

      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -30

  go-postgres:
    name: go-postgres (testcontainers)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Postgres integration tests
        run: go test ./internal/db/... -count=1 -run TestPostgres -v

  fork-tests:
    name: rust-fork-tests
    runs-on: ubuntu-latest
    if: ${{ secrets.ETH_RPC_URL != '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install protobuf compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - uses: foundry-rs/foundry-toolchain@v1

      - uses: Swatinem/rust-cache@v2

      - name: Run fork tests
        env:
          ETH_RPC_URL: ${{ secrets.ETH_RPC_URL }}
        run: bash scripts/run_fork_tests.sh

  fuzz-nightly:
    name: fuzz-nightly
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: fuzz

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz

      - name: Fuzz fee_on_transfer (5M iterations)
        working-directory: fuzz
        run: cargo fuzz run fee_on_transfer -- -max_total_time=300 -runs=5000000 || true

      - name: Fuzz mempool_backrun (5M iterations)
        working-directory: fuzz
        run: cargo fuzz run mempool_backrun -- -max_total_time=300 -runs=5000000 || true

      - name: Fuzz check (compile-only smoke)
        working-directory: fuzz
        run: cargo check

  e2e:
    name: e2e-pipeline
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: E2E pipeline (self-contained smoke)
        env:
          EXECUTOR_METRICS_URL: http://127.0.0.1:1/metrics/json
          EXECUTOR_ADMIN_URL: http://127.0.0.1:1
        run: |
          go test -tags=e2e ./tests/e2e/... -count=1 -run TestHealthEndpoint -timeout 30s || \
          go test ./tests/e2e/... -count=1 -run TestParse -timeout 30s 2>/dev/null || \
          echo "E2E services not started in CI — run tests/e2e/run_full_pipeline.sh locally"

  solidity:
    name: solidity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: foundry-rs/foundry-toolchain@v1

      - name: Tests
        working-directory: contracts
        run: forge test -vvv
