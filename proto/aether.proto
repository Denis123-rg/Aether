syntax = "proto3";
package aether;

option go_package = "github.com/aether-arb/aether/internal/pb";

service ArbService {
    rpc SubmitArb(ValidatedArb) returns (SubmitArbResponse);
    rpc StreamArbs(StreamArbsRequest) returns (stream ValidatedArb);
}

service HealthService {
    rpc Check(HealthCheckRequest) returns (HealthCheckResponse);
}

service ControlService {
    rpc SetState(SetStateRequest) returns (SetStateResponse);
    rpc ReloadConfig(ReloadConfigRequest) returns (ReloadConfigResponse);
}

enum ProtocolType {
    PROTOCOL_UNKNOWN = 0;
    UNISWAP_V2 = 1;
    UNISWAP_V3 = 2;
    SUSHISWAP = 3;
    CURVE = 4;
    BALANCER_V2 = 5;
    BANCOR_V3 = 6;
    BALANCER_V3 = 7;
}

enum SystemState {
    STATE_UNKNOWN = 0;
    RUNNING = 1;
    DEGRADED = 2;
    PAUSED = 3;
    HALTED = 4;
}

// Source channel for an arb opportunity. BlockDriven is the historical
// path (Sync/Swap events on confirmed blocks); MempoolBackrun is the new
// pending-tx path where validation forks at the victim's parent block,
// applies the victim, applies our arb, and only publishes on success.
enum ArbSource {
    SOURCE_UNKNOWN = 0;
    BLOCK_DRIVEN = 1;
    MEMPOOL_BACKRUN = 2;
}

message SwapStep {
    ProtocolType protocol = 1;
    bytes pool_address = 2;
    bytes token_in = 3;
    bytes token_out = 4;
    bytes amount_in = 5;
    bytes min_amount_out = 6;
    bytes calldata = 7;
}

message ArbHop {
    ProtocolType protocol = 1;
    bytes pool_address = 2;
    bytes token_in = 3;
    bytes token_out = 4;
    bytes amount_in = 5;
    bytes expected_out = 6;
    uint64 estimated_gas = 7;
}

message ValidatedArb {
    string id = 1;
    repeated ArbHop hops = 2;
    bytes total_profit_wei = 3;
    uint64 total_gas = 4;
    bytes gas_cost_wei = 5;
    bytes net_profit_wei = 6;
    uint64 block_number = 7;
    int64 timestamp_ns = 8;
    bytes flashloan_token = 9;
    bytes flashloan_amount = 10;
    repeated SwapStep steps = 11;
    bytes calldata = 12;

    // Which detection channel surfaced this opportunity. Defaults to
    // SOURCE_UNKNOWN for backward compatibility with publishers that
    // pre-date the field; existing block-driven callers will be updated
    // to set BLOCK_DRIVEN. Mempool-backrun publishers set MEMPOOL_BACKRUN
    // and additionally populate `victim_tx_hash` + `target_block`.
    ArbSource source = 13;
    // Pending-tx hash the bundle is backrunning. Empty when source is
    // BLOCK_DRIVEN.
    bytes victim_tx_hash = 14;
    // Slot the bundle is targeting. For BLOCK_DRIVEN this matches
    // block_number+1; for MEMPOOL_BACKRUN it matches the block the
    // builder is currently constructing.
    uint64 target_block = 15;
    // Canonical EIP-2718 raw signed bytes of the pending victim tx, captured
    // at the mempool subscription boundary. Empty unless source is
    // MEMPOOL_BACKRUN. The Go executor places this as txs[0] in the bundle so
    // the builder includes our arb iff the victim is included in the same block.
    bytes victim_raw_tx = 16;
}

message SubmitArbResponse {
    bool accepted = 1;
    string bundle_hash = 2;
    string error = 3;
}

message StreamArbsRequest {
    double min_profit_eth = 1;
}

message HealthCheckRequest {}
message HealthCheckResponse {
    bool healthy = 1;
    string status = 2;
    int64 uptime_seconds = 3;
    uint64 last_block = 4;
    uint32 active_pools = 5;
}

message SetStateRequest {
    SystemState state = 1;
    string reason = 2;
}
message SetStateResponse {
    bool success = 1;
    SystemState previous_state = 2;
}

message ReloadConfigRequest {
    string config_path = 1;
}
message ReloadConfigResponse {
    bool success = 1;
    uint32 pools_loaded = 2;
    string error = 3;
}
